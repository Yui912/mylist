<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>My List</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
.pw-screen{position:fixed;inset:0;background:#F5F2EE;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px}
.pw-title{font-size:24px;font-weight:700;letter-spacing:-0.5px;color:#1A1714}
.pw-sub{font-size:13px;color:#A8A29C}
.pw-input{width:240px;padding:12px 16px;border:1.5px solid #E2DDD8;border-radius:12px;font-size:16px;font-family:'Noto Sans JP',sans-serif;outline:none;text-align:center;background:white;letter-spacing:2px}
.pw-input:focus{border-color:#C8472B}
.pw-btn{width:240px;padding:13px;background:#1A1714;color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer}
.pw-btn:active{opacity:.85}
.pw-err{font-size:12px;color:#C8472B;font-weight:600;min-height:18px}

:root {
  --bg:#F5F2EE; --surface:#FFFFFF; --surface2:#F0EDE8;
  --ink:#1A1714; --ink2:#6B6560; --ink3:#A8A29C;
  --accent:#C8472B; --accent2:#E8A030; --green:#3A8C5C; --blue:#2B6CB0;
  --border:#E2DDD8; --shadow:0 2px 12px rgba(0,0,0,0.07); --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

.header{background:var(--surface);padding:20px 20px 0;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.header-title{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.hcount{font-family:'DM Mono',monospace;font-size:12px;color:var(--ink3);background:var(--surface2);padding:4px 10px;border-radius:20px}
.hadd{width:32px;height:32px;border-radius:50%;background:var(--ink);color:white;border:none;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}

.chip-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:14px;scrollbar-width:none}
.chip-strip::-webkit-scrollbar{display:none}
.chip{display:flex;align-items:center;gap:4px;white-space:nowrap;font-size:12px;font-weight:500;padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--ink2);cursor:pointer;transition:all .15s;flex-shrink:0}
.chip.active{background:var(--ink);color:white;border-color:var(--ink)}
.cdot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.chip.active .cdot{background:white}

.tabs{display:flex;border-bottom:1px solid var(--border)}
.tab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab.active{color:var(--ink);border-bottom-color:var(--accent)}

.list-wrap{padding:16px 16px 100px}
.slabel{font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--ink3);padding:8px 4px}

.card{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s;border:1px solid transparent}
.card:active{transform:scale(.98)}
.card.urgent{border-left:3px solid var(--accent)}
.card.nocon{border-left:3px solid var(--accent2)}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.cname{font-size:16px;font-weight:700;letter-spacing:-.3px}
.cmemo{font-size:11px;color:var(--ink3);margin-top:3px;line-height:1.4}
.cbadges{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;flex-shrink:0;margin-left:8px}
.badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:.3px}
.babo{background:#EBF4FF;color:var(--blue)}
.bpc{background:#E8F5EE;color:var(--green)}
.bnone{background:var(--surface2);color:var(--ink3)}
.bflag{background:#FEF3E2;color:#C07800}
.bstop{background:#FFE8E5;color:var(--accent)}
.cmeta{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.mitem{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--ink2)}
.mdot{width:5px;height:5px;border-radius:50%}
.rtag{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--accent);margin-left:auto}
.rtag.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.lecrow{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap}
.lchip{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:500;background:#E8F5EE;color:var(--green)}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;backdrop-filter:blur(2px)}
.overlay.open{display:block}
.sheet{position:fixed;bottom:0;left:0;right:0;transform:translateY(100%);width:100%;background:var(--surface);border-radius:24px 24px 0 0;z-index:400;max-height:90vh;overflow-y:auto;padding-bottom:40px;transition:transform .3s cubic-bezier(.32,.72,0,1)}
.sheet.open{transform:translateY(0)}
.shandle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 20px}
.shdr{padding:0 20px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
.sclose{width:32px;height:32px;border-radius:50%;background:var(--surface2);border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink2);flex-shrink:0;margin-left:10px}
.ssec{padding:16px 20px;border-bottom:1px solid var(--border)}
.ssec-title{font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--ink3);margin-bottom:10px;text-transform:uppercase}
.elabel{font-size:11px;font-weight:700;letter-spacing:.6px;color:var(--ink3);margin-bottom:5px}
.erow{margin-bottom:12px}
.efield{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;font-family:'Noto Sans JP',sans-serif;color:var(--ink);outline:none;transition:border-color .15s}
.efield:focus{border-color:var(--accent);background:white}
.spicker{display:flex;gap:8px}
.sbtn{flex:1;padding:9px 0;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);font-size:13px;font-weight:600;font-family:'Noto Sans JP',sans-serif;color:var(--ink2);cursor:pointer;transition:all .15s;text-align:center}
.sbtn.sabo{background:#EBF4FF;border-color:var(--blue);color:var(--blue)}
.sbtn.spc{background:#E8F5EE;border-color:var(--green);color:var(--green)}
.sbtn.snone{background:var(--surface2);border-color:var(--ink3);color:var(--ink)}
.fwrap{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.fbtn{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface2);font-size:13px;font-weight:500;font-family:'Noto Sans JP',sans-serif;color:var(--ink2);cursor:pointer;transition:all .15s}
.fbtn.on{background:#FFE8E5;border-color:var(--accent);color:var(--accent);font-weight:700}
.fadd{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface2);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink2);flex-shrink:0}
.lgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.llabel{font-size:11px;color:var(--ink3);margin-bottom:3px;font-weight:500}
.larow{display:flex;gap:8px;margin-bottom:10px}
.linput{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;font-size:13px;font-family:'Noto Sans JP',sans-serif;color:var(--ink);outline:none}
.linput:focus{border-color:var(--accent);background:white}
.lsubmit{padding:9px 14px;background:var(--ink);color:white;border:none;border-radius:10px;font-size:13px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;white-space:nowrap}
.litem{display:flex;gap:8px;padding:10px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.litem:last-child{border-bottom:none}
.litem.selected{background:var(--surface2);margin:0 -20px;padding:10px 20px;border-radius:0}
.lchk{width:18px;height:18px;flex-shrink:0;margin-top:2px;cursor:pointer;accent-color:var(--accent)}
.ldate{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);white-space:nowrap;min-width:44px;padding-top:2px}
.ltext{font-size:13px;color:var(--ink2);line-height:1.6;flex:1;white-space:pre-wrap;word-break:break-all}
.ledit-btn{background:none;border:none;font-size:14px;color:var(--ink3);cursor:pointer;padding:0 4px;flex-shrink:0}
.log-edit-area{width:100%;font-size:13px;border:1.5px solid var(--accent);border-radius:8px;padding:6px 8px;resize:none;line-height:1.6;font-family:inherit;background:var(--surface);color:var(--ink)}
.larow{display:flex;gap:8px;margin-bottom:8px;align-items:flex-end}
.log-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.savebtn{width:100%;padding:14px;background:var(--accent);color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer}
.savebtn:active{opacity:.85}
.empty{text-align:center;padding:60px 20px;color:var(--ink3);font-size:14px}
</style>
</head>
<body>

<div class="pw-screen" id="pw-screen">
  <div class="pw-title">My List</div>
  <div class="pw-sub">パスワードを入力してください</div>
  <input class="pw-input" type="password" id="pw-input" placeholder="••••••••••••" autocomplete="current-password">
  <div class="pw-err" id="pw-err"></div>
  <button class="pw-btn" onclick="checkPW()">入る</button>
</div>

<div id="main-view">
<div class="header">
  <div class="header-top">
    <div style="display:flex;align-items:center;gap:8px">
      <button id="btn-menu" style="width:32px;height:32px;border-radius:50%;background:var(--surface2);border:1.5px solid var(--border);color:var(--ink2);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0">≡</button>
      <div class="header-title">My List</div>
      <div class="hcount" id="total-count">0人</div>
    </div>
    <div id="owner-label" style="font-size:11px;color:var(--ink3);margin-top:2px"></div>
    <div style="display:flex;align-items:center;gap:8px">
      
      <button id="btn-search" style="height:32px;padding:0 12px;border-radius:16px;background:var(--surface2);border:1.5px solid var(--border);color:var(--ink2);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0">名前🔍</button>
      <button class="hadd" id="btn-add" style="width:auto;padding:0 12px;border-radius:16px;font-size:12px;font-weight:700;white-space:nowrap">List＋</button>
    </div>
  </div>
  <div class="chip-strip" id="chip-strip">
    <!-- 動的に生成 -->
  </div>
  <div class="tabs" id="tabs-wrap">
    <div class="tab active" data-c="all">全員</div>
    <div class="tab" data-c="none">未登録</div>
    <div class="tab" data-c="pc">PC</div>
    <div class="tab" data-c="abo">ABO</div>
  </div>
</div>

<div class="list-wrap" id="list-wrap"></div>

<div class="overlay" id="overlay"></div>
<div class="sheet" id="sheet">
  <div class="shandle"></div>
  <div id="sheet-body"></div>
</div>
</div>
<div id="map-view" style="display:none;position:fixed;inset:0;z-index:200;overflow-y:auto;background:var(--bg)"></div>

<script>

var PW = 'iwillshowyou';
var SESSION_KEY = 'mylist_auth';
function checkPW(){
  var val = document.getElementById('pw-input').value;
  if(val === PW){
    sessionStorage.setItem(SESSION_KEY, '1');
    document.getElementById('pw-screen').style.display = 'none';
  } else {
    document.getElementById('pw-err').textContent = 'パスワードが違います';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}
// Enterキー対応
document.addEventListener('DOMContentLoaded', function(){
  var inp = document.getElementById('pw-input');
  if(inp) inp.addEventListener('keydown', function(e){ if(e.key==='Enter') checkPW(); });
  // セッション確認
  if(sessionStorage.getItem(SESSION_KEY) === '1'){
    document.getElementById('pw-screen').style.display = 'none';
  }
});


var LECS = ['洗剤','化粧品','サプリ','水・空気','鍋'];
var allFlags = ['直以外', 'アプローチしない', '独立'];
var curFilter = 'all';
var curCat = 'all';
var curP = null;
var mapLocked = false;

// URLパラメータからownerを取得
var urlParams = new URLSearchParams(window.location.search);
var OWNER = urlParams.get('u') || 'default';

var GAS_URL = 'https://script.google.com/macros/s/AKfycbw2EBflnMw7aNdMShBe1SrjaaWC8m0_Toe0b5L6SmfWOOfe7JDYqCNmyWf6Jjo366MR/exec';
var people = [];
var isLoading = false;

// ── 保存キュー（並列保存によるデータ破壊を防ぐ） ──
var _saveQueue = [];
var _saveRunning = false;
function _runSaveQueue(){
  if(_saveRunning || _saveQueue.length === 0) return;
  _saveRunning = true;
  var job = _saveQueue.shift();
  function done(){ _saveRunning = false; _runSaveQueue(); }
  fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'save', person: job.person })
  })
  .then(done)
  .catch(function(e){ console.error('save error', e); done(); });
}
function saveToSheet(person){
  person.owner = OWNER;
  // 同じIDが既にキューにあれば最新で上書き（重複排除）
  var exists = false;
  for(var i = 0; i < _saveQueue.length; i++){
    if(_saveQueue[i].person.id === person.id){
      _saveQueue[i].person = JSON.parse(JSON.stringify(person));
      exists = true; break;
    }
  }
  if(!exists) _saveQueue.push({ person: JSON.parse(JSON.stringify(person)) });
  _runSaveQueue();
}

function loadFromSheet(){
  isLoading = true;
  document.getElementById('list-wrap').innerHTML = '<div class="empty">読み込み中…</div>';
  fetch(GAS_URL + '?action=getAll&owner=' + OWNER)
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data.people){
        people = data.people;
        var today = new Date(); today.setHours(0,0,0,0);
        var toReset = [];
        // 過去の次アポをリセット＆カスタムフラグを復元
        people.forEach(function(p){
          // 空文字を null に正規化
          if(p.nextApo === '') p.nextApo = null;
          if(p.reminder === '') p.reminder = null;
          if(p.birthday === '') p.birthday = null;
          if(p.makerDate === '') p.makerDate = null;
          if(p.lastContact === '') p.lastContact = null;
          if(p.nextApo && new Date(p.nextApo) < today){
            p.nextApo = null;
            toReset.push(p);
          }
          if(p.flags && p.flags.length){
            p.flags.forEach(function(f){
              if(f !== 'アプローチしない' && f !== '直以外' && f !== '独立' && !allFlags.includes(f)){
                allFlags.push(f);
              }
            });
          }
        });
        // アポリセットは直列キューで順番に保存（並列禁止）
        toReset.forEach(function(p){ saveToSheet(p); });
      }
      isLoading = false;
      render();
    })
    .catch(function(e){
      isLoading = false;
      document.getElementById('list-wrap').innerHTML = '<div class="empty">読み込みエラー。再読み込みしてください。</div>';
    });
}

function todayStr(){return new Date().toISOString().split('T')[0]}
function ddiff(d){if(!d)return null;return Math.round((new Date(d)-new Date())/86400000)}
function dsince(d){if(!d)return 9999;return Math.round((new Date()-new Date(d))/86400000)}
function fmtD(d){if(!d)return null;var dt=new Date(d);return (dt.getMonth()+1)+'/'+dt.getDate()}
function nextId(){
  // タイムスタンプ＋ランダムで衝突しないIDを生成
  var base = Date.now();
  var existing = people.map(function(p){ return p.id; });
  while(existing.indexOf(base) !== -1){ base++; }
  return base;
}

function bdDaysUntil(bd){
  var now=new Date();now.setHours(0,0,0,0);
  var parts=bd.split('-');
  var next=new Date(now.getFullYear(),parseInt(parts[1])-1,parseInt(parts[2]));
  if(next<now)next=new Date(now.getFullYear()+1,parseInt(parts[1])-1,parseInt(parts[2]));
  return Math.round((next-now)/86400000);
}

function getList(){
  var list=people.slice();
  if(curCat!=='all')list=list.filter(function(p){return p.status===curCat});
  if(curFilter!=='all')list=list.filter(function(p){return !p.flags.includes('アプローチしない')});
  if(curFilter==='nextapo'){
    var today=new Date(); today.setHours(0,0,0,0);
    list=list.filter(function(p){
      return p.nextApo && new Date(p.nextApo)>=today;
    }).sort(function(a,b){return new Date(a.nextApo)-new Date(b.nextApo)});
  } else if(curFilter==='reminder'){
    list=list.filter(function(p){return p.reminder}).sort(function(a,b){return new Date(a.reminder)-new Date(b.reminder)});
  } else if(curFilter==='birthday'){
    list=list.filter(function(p){
      if(!p.birthday)return false;
      var d=bdDaysUntil(p.birthday);
      return d>=-1&&d<=30;
    }).sort(function(a,b){return bdDaysUntil(a.birthday)-bdDaysUntil(b.birthday)});
  } else if(curFilter==='random'){
    // シャッフルして全員表示
    for(var i=list.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=list[i];list[i]=list[j];list[j]=t;}
  } else if(curFilter==='independent'){
    list=list.filter(function(p){return p.flags.includes('独立')});
  } else if(curFilter==='naoi'){
    list=list.filter(function(p){return p.flags.includes('直以外')});
  } else if(curFilter==='noapproach'){
    list=list.filter(function(p){return p.flags.includes('アプローチしない')});
  } else {
    var customFlags=allFlags.filter(function(f){return f!=='アプローチしない'&&f!=='独立'&&f!=='直以外'});
    if(customFlags.includes(curFilter)){
      list=list.filter(function(p){return p.flags.includes(curFilter)});
    }
  }
  return list;
}

function render(){
  var list=getList();
  document.getElementById('total-count').textContent=people.length+'人';
  var ol=document.getElementById('owner-label');
  if(ol)ol.textContent=OWNER!=='default'?OWNER:'';
  // filter-count removed

  renderChips();

  var wrap=document.getElementById('list-wrap');
  if(list.length===0){wrap.innerHTML='<div class="empty">該当する人がいません</div>';return}

  var html='';
  if(curFilter==='nextapo'){
    var today2=new Date(); today2.setHours(0,0,0,0);
    var todayApo=list.filter(function(p){ var d=new Date(p.nextApo); d.setHours(0,0,0,0); return d.getTime()===today2.getTime(); });
    var futureApo=list.filter(function(p){ var d=new Date(p.nextApo); d.setHours(0,0,0,0); return d.getTime()>today2.getTime(); });
    if(todayApo.length){html+='<div class="slabel">📅 今日</div>';todayApo.forEach(function(p){html+=cHTML(p)})}
    if(futureApo.length){html+='<div class="slabel">予定</div>';futureApo.forEach(function(p){html+=cHTML(p)})}
  } else if(curFilter==='reminder'){
    var over=list.filter(function(p){return ddiff(p.reminder)<0});
    var soon=list.filter(function(p){var d=ddiff(p.reminder);return d!==null&&d>=0&&d<=2});
    var up=list.filter(function(p){return ddiff(p.reminder)>2});
    if(over.length){html+='<div class="slabel">⚠️ 期限切れ</div>';over.forEach(function(p){html+=cHTML(p)})}
    if(soon.length){html+='<div class="slabel">🔴 今すぐ</div>';soon.forEach(function(p){html+=cHTML(p)})}
    if(up.length){html+='<div class="slabel">近日中</div>';up.forEach(function(p){html+=cHTML(p)})}
  } else if(curFilter==='birthday'){
    var todayBD=list.filter(function(p){
      var now=new Date();now.setHours(0,0,0,0);
      var parts=p.birthday.split('-');
      var next=new Date(now.getFullYear(),parseInt(parts[1])-1,parseInt(parts[2]));
      return Math.round((next-now)/86400000)===0;
    });
    var yesterdayBD=list.filter(function(p){
      var now=new Date();now.setHours(0,0,0,0);
      var parts=p.birthday.split('-');
      var next=new Date(now.getFullYear(),parseInt(parts[1])-1,parseInt(parts[2]));
      return Math.round((next-now)/86400000)===-1;
    });
    var tomorrowBD=list.filter(function(p){
      var now=new Date();now.setHours(0,0,0,0);
      var parts=p.birthday.split('-');
      var next=new Date(now.getFullYear(),parseInt(parts[1])-1,parseInt(parts[2]));
      return Math.round((next-now)/86400000)===1;
    });
    var restBD=list.filter(function(p){
      var now=new Date();now.setHours(0,0,0,0);
      var parts=p.birthday.split('-');
      var next=new Date(now.getFullYear(),parseInt(parts[1])-1,parseInt(parts[2]));
      var d=Math.round((next-now)/86400000);
      return d>1&&d<=30;
    });
    if(todayBD.length){html+='<div class="slabel">🎂 今日</div>';todayBD.forEach(function(p){html+=cHTML(p)})}
    if(yesterdayBD.length){html+='<div class="slabel">昨日</div>';yesterdayBD.forEach(function(p){html+=cHTML(p)})}
    if(tomorrowBD.length){html+='<div class="slabel">明日</div>';tomorrowBD.forEach(function(p){html+=cHTML(p)})}
    if(restBD.length){html+='<div class="slabel">近い人</div>';restBD.forEach(function(p){html+=cHTML(p)})}
    if(!list.length){html='<div class="empty">30日以内に誕生日の人はいません</div>'}
  } else if(curFilter==='random'){
    html+='<div class="slabel">🎲 ランダム</div>';
    list.forEach(function(p){html+=cHTML(p)});
  } else if(curFilter==='independent'){
    html+='<div class="slabel">独立</div>';
    list.forEach(function(p){html+=cHTML(p)});
  } else if(curFilter==='naoi'){
    html+='<div class="slabel">直以外</div>';
    list.forEach(function(p){html+=cHTML(p)});
  } else if(curFilter==='noapproach'){
    html+='<div class="slabel">アプローチしない</div>';
    list.forEach(function(p){html+=cHTML(p)});
  } else {
    list.forEach(function(p){html+=cHTML(p)});
  }
  wrap.innerHTML=html;
}

function cHTML(p){
  var urgent=ddiff(p.reminder)!==null&&ddiff(p.reminder)<=2;
  var nocon=dsince(p.lastContact)>30;
  var cls='card'+(urgent?' urgent':nocon?' nocon':'');
  var sb=p.status==='abo'?'<span class="badge babo">ABO</span>':p.status==='pc'?'<span class="badge bpc">PC</span>':'<span class="badge bnone">未登録</span>';
  var fb=p.flags.map(function(f){return '<span class="badge '+(f==='アプローチしない'?'bstop':'bflag')+'">'+f+'</span>'}).join('');
  var rt=p.reminder?'<div class="rtag'+(urgent?' pulse':'')+'">📅 '+fmtD(p.reminder)+'</div>':'';
  var dl=LECS.filter(function(l){return p.lectures[l]});
  var lc=dl.length?'<div class="lecrow">'+dl.map(function(l){return '<span class="lchip">'+l+'</span>'}).join('')+'</div>':'';
  var ls=p.lastContact?'<div class="mitem"><span class="mdot" style="background:var(--ink3)"></span>'+dsince(p.lastContact)+'日前</div>':'';
  var mm=p.memo?'<div class="cmemo">'+p.memo+'</div>':'';
  var bdStr='';
  if(p.birthday){
    var now=new Date();now.setHours(0,0,0,0);
    var parts=p.birthday.split('-');
    var next=new Date(now.getFullYear(),parseInt(parts[1])-1,parseInt(parts[2]));
    if(next<now)next=new Date(now.getFullYear()+1,parseInt(parts[1])-1,parseInt(parts[2]));
    var dbd=Math.round((next-now)/86400000);
    var bdLabel=dbd===0?'🎂 今日！':dbd===1?'🎂 明日':dbd===-1?'🎂 昨日':'🎂 '+(parseInt(parts[1]))+'/'+(parseInt(parts[2]));
    bdStr='<div class="mitem" style="color:#E8A030;font-weight:600">'+bdLabel+'</div>';
  }
  var naStr='';
  if(p.nextApo){
    var today2=new Date();today2.setHours(0,0,0,0);
    var naDate=new Date(p.nextApo);naDate.setHours(0,0,0,0);
    if(naDate>=today2){
      var dna=Math.round((naDate-today2)/86400000);
      var naLabel=dna===0?'📌 今日アポ！':dna===1?'📌 明日アポ':'📌 '+(naDate.getMonth()+1)+'/'+(naDate.getDate());
      naStr='<div class="mitem" style="color:#4A90D9;font-weight:600">'+naLabel+'</div>';
    }
  }
  return '<div class="'+cls+'" onclick="openDetail('+p.id+')">'
    +'<div class="ctop"><div style="flex:1;min-width:0"><div class="cname">'+p.name+'</div>'+mm+'</div>'
    +'<div class="cbadges">'+sb+fb+'</div></div>'
    +'<div class="cmeta">'+naStr+ls+bdStr+rt+'</div>'+lc+'</div>';
}

function bindDetail(){
  var p=curP;
  document.getElementById('btn-close').onclick=closeSheet;

  function save(){
    var n=document.getElementById('f-name');
    var m=document.getElementById('f-memo');
    var r=document.getElementById('f-reminder');
    var mk=document.getElementById('f-maker');
    if(n)p.name=n.value.trim()||p.name;
    if(m)p.memo=m.value;
    if(r)p.reminder=r.value||null;
    if(mk)p.makerDate=mk.value||null;
    var na=document.getElementById('f-nextapo');
    if(na)p.nextApo=na.value||null;
    var bd=document.getElementById('f-birthday');
    if(bd)p.birthday=bd.value||null;
    document.querySelectorAll('[data-lec]').forEach(function(el){
      p.lectures[el.dataset.lec]=el.value?el.value.replace(/-/g,'/'):null;
    });
    render();toast('保存済み ✓');
    saveToSheet(p);
  }

  document.querySelectorAll('.clr-btn').forEach(function(btn){
    btn.onclick=function(){
      var el=document.getElementById(btn.dataset.target);
      if(el){ el.value=''; save(); }
    };
  });
  var fn=document.getElementById('f-name');if(fn)fn.addEventListener('input',save);
  var fm=document.getElementById('f-memo');if(fm)fm.addEventListener('input',save);
  var fna=document.getElementById('f-nextapo');if(fna)fna.addEventListener('change',save);
  var fr=document.getElementById('f-reminder');if(fr)fr.addEventListener('change',save);
  var fmk=document.getElementById('f-maker');if(fmk)fmk.addEventListener('change',save);
  var fbd=document.getElementById('f-birthday');if(fbd)fbd.addEventListener('change',save);
  document.querySelectorAll('[data-lec]').forEach(function(el){el.addEventListener('change',save)});

  document.querySelectorAll('[data-s]').forEach(function(btn){
    btn.onclick=function(){
      p.status=btn.dataset.s;
      document.querySelectorAll('[data-s]').forEach(function(b){b.className='sbtn'+(b.dataset.s===p.status?' s'+p.status:'')});
      render();toast('保存済み ✓');
      saveToSheet(p);
    };
  });

  var delBtn = document.getElementById('btn-delete');
  if(delBtn) delBtn.onclick = function(){
    if(!confirm(p.name + ' を削除しますか？\nこの操作は取り消せません。')) return;
    // メモリから削除
    var idx = -1;
    for(var i = 0; i < people.length; i++){ if(people[i].id === p.id){ idx = i; break; } }
    if(idx !== -1) people.splice(idx, 1);
    // GASから削除
    fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'delete', id: p.id })
    }).catch(function(e){ console.error('delete error', e); });
    closeSheet();
    render();
    toast(p.name + ' を削除しました');
  };

  function bindFlags(){
    var fwrap=document.getElementById('fwrap');
    if(!fwrap) return;
    fwrap.querySelectorAll('[data-flag]').forEach(function(btn){
      btn.onclick=function(){
        var f=btn.dataset.flag;
        var idx=p.flags.indexOf(f);
        if(idx===-1)p.flags.push(f);else p.flags.splice(idx,1);
        btn.className='fbtn'+(p.flags.includes(f)?' on':'');
        btn.textContent=(p.flags.includes(f)?'✓ ':'')+f;
        render();toast('保存済み ✓');
        saveToSheet(p);
      };
    });
    var fadd=document.getElementById('btn-fadd');
    if(fadd)fadd.onclick=function(){
      openFlagMgr(function(){
        var wrap=document.getElementById('fwrap');
        if(wrap){
          wrap.innerHTML=allFlags.map(function(fl){
            var on=p.flags.includes(fl);
            return '<button class="fbtn'+(on?' on':'')+'" data-flag="'+fl+'">'+(on?'✓ ':'')+fl+'</button>';
          }).join('')+'<button class="fadd" id="btn-fadd">＋</button>';
          bindFlags();
        }
        render();
      });
    };
  }
  bindFlags(); // ← これが抜けていた
}

function openFlagMgr(onClose){
  function refresh(){
    var listHTML = allFlags.map(function(f, i){
      if(f==='アプローチしない'||f==='直以外'||f==='独立'){
        return '<div style="display:flex;align-items:center;gap:8px;padding:12px 0;border-bottom:1px solid var(--border)">'
          +'<span style="flex:1;font-size:14px;color:var(--ink3);padding:7px 10px">'+f+'（変更不可）</span>'
          +'</div>';
      }
      return '<div style="display:flex;align-items:center;gap:8px;padding:12px 0;border-bottom:1px solid var(--border)">'
        +'<input class="efield fmgr-edit" data-idx="'+i+'" value="'+f+'" style="flex:1;font-size:14px;padding:7px 10px">'
        +'<button class="fmgr-del" data-idx="'+i+'" style="background:none;border:none;color:var(--ink3);font-size:22px;cursor:pointer;padding:4px 8px;line-height:1;flex-shrink:0">×</button>'
        +'</div>';
    }).join('') || '<div style="color:var(--ink3);font-size:13px;padding:8px 0">まだフラグがありません</div>';

    showSheet(
      '<div class="shdr">'
      +'<div style="font-size:17px;font-weight:700">フラグ管理</div>'
      +'<button class="sclose" id="btn-close">✕</button>'
      +'</div>'
      +'<div class="ssec" id="fmgr-list">'+listHTML+'</div>'
      +'<div class="ssec">'
      +'<div style="display:flex;gap:8px">'
      +'<input id="fmgr-input" class="efield" placeholder="新しいフラグ名…" style="flex:1">'
      +'<button id="fmgr-add-btn" style="padding:10px 16px;background:var(--ink);color:white;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap">追加</button>'
      +'</div>'
      +'</div>'
    );

    document.getElementById('btn-close').onclick = function(){ closeSheet(); if(onClose)onClose(); };

    document.querySelectorAll('.fmgr-del').forEach(function(btn){
      btn.onclick = function(){
        var idx = parseInt(btn.dataset.idx);
        var f = allFlags[idx];
        allFlags.splice(idx, 1);
        people.forEach(function(p){ var i=p.flags.indexOf(f); if(i!==-1)p.flags.splice(i,1); });
        refresh();
        if(onClose)onClose();
      };
    });

    // フラグ名編集：フォーカスアウト or Enterで保存
    document.querySelectorAll('.fmgr-edit').forEach(function(inp){
      function saveEdit(){
        var idx = parseInt(inp.dataset.idx);
        var newName = inp.value.trim();
        if(!newName) { inp.value = allFlags[idx]; return; } // 空なら元に戻す
        if(newName === allFlags[idx]) return; // 変更なし
        if(allFlags.includes(newName)) { toast('同じ名前のフラグが既にあります'); inp.value = allFlags[idx]; return; }
        var oldName = allFlags[idx];
        allFlags[idx] = newName;
        // そのフラグを持つ全員のデータを更新
        people.forEach(function(p){
          var fi = p.flags.indexOf(oldName);
          if(fi !== -1){
            p.flags[fi] = newName;
            saveToSheet(p);
          }
        });
        toast(oldName + ' → ' + newName + ' に変更しました');
        if(onClose) onClose();
      }
      inp.addEventListener('blur', saveEdit);
      inp.addEventListener('keydown', function(e){ if(e.key === 'Enter'){ inp.blur(); } });
    });

    function addFlag(){
      var inp = document.getElementById('fmgr-input');
      var v = inp.value.trim();
      if(!v) return;
      if(!allFlags.includes(v)) allFlags.push(v);
      inp.value = '';
      refresh();
      toast(v + ' を追加しました');
      if(onClose)onClose();
    }
    document.getElementById('fmgr-add-btn').onclick = addFlag;
    document.getElementById('fmgr-input').addEventListener('keydown', function(e){ if(e.key==='Enter') addFlag(); });
    setTimeout(function(){ var inp=document.getElementById('fmgr-input'); if(inp)inp.focus(); }, 300);
  }
  refresh();
}



function renderChips(){
  var strip=document.getElementById('chip-strip');
  if(!strip)return;

  var rc=people.filter(function(p){return p.reminder}).length;
  var bc=people.filter(function(p){
    if(!p.birthday)return false;
    var now=new Date();var parts=p.birthday.split('-');
    var next=new Date(now.getFullYear(),parseInt(parts[1])-1,parseInt(parts[2]));
    if(next<now)next=new Date(now.getFullYear()+1,parseInt(parts[1])-1,parseInt(parts[2]));
    return (next-now)/86400000<=30;
  }).length;

  var customFlags=allFlags.filter(function(f){return f!=='アプローチしない'&&f!=='独立'&&f!=='直以外'});
  var nac=people.filter(function(p){return p.flags.includes('アプローチしない')}).length;

  function chip(f,label,dot){
    var active=curFilter===f?' active':'';
    var dotHtml=dot?'<span class="cdot" style="background:'+dot+'"></span>':'';
    return '<div class="chip'+active+'" data-f="'+f+'">'+dotHtml+'<span>'+label+'</span></div>';
  }

  var html='';
  html+='<button id="btn-flag-mgr" style="width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface2);color:var(--ink2);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0">＋</button>';
  var ac=people.filter(function(p){
    if(!p.nextApo) return false;
    var today=new Date(); today.setHours(0,0,0,0);
    return new Date(p.nextApo)>=today;
  }).length;
  html+=chip('all','すべて','');
  if(ac>0) html+=chip('nextapo','次アポ ('+ac+')','#4A90D9');
  html+=chip('reminder','リマインドあり ('+rc+')','#C8472B');
  html+=chip('birthday','🎂 誕生日近い ('+bc+')','');
  html+=chip('random','🎲 ランダム','');
  customFlags.forEach(function(f){
    var cnt=people.filter(function(p){return p.flags.includes(f)}).length;
    html+=chip(f,f+' ('+cnt+')','');
  });
  var indc=people.filter(function(p){return p.flags.includes('独立')}).length;
  if(indc>0)html+=chip('independent','独立 ('+indc+')','');
  if(nac>0)html+=chip('noapproach','アプローチしない ('+nac+')','');

  strip.innerHTML=html;

  // イベント再バインド
  strip.querySelectorAll('.chip').forEach(function(el){
    el.onclick=function(){
      curFilter=el.dataset.f;
      renderChips();
      renderList();
    };
  });
  // タブに人数表示
  var tabCounts = {all:people.length, none:0, pc:0, abo:0};
  people.forEach(function(p){
    if(p.status==='none'||!p.status) tabCounts.none++;
    else if(p.status==='pc') tabCounts.pc++;
    else if(p.status==='abo') tabCounts.abo++;
  });
  document.querySelectorAll('.tab').forEach(function(t){
    var c = t.dataset.c;
    var n = tabCounts[c];
    t.textContent = (c==='all'?'全員':c==='none'?'未登録':c==='pc'?'PC':'ABO') + (n>0?' ('+n+')':'');
  });
  var mgr=document.getElementById('btn-flag-mgr');
  if(mgr)mgr.onclick=function(){openFlagMgr(function(){render();})};
}

function renderList(){
  var list=getList();
  // filter-count removed
  var wrap=document.getElementById('list-wrap');
  if(list.length===0){wrap.innerHTML='<div class="empty">該当する人がいません</div>';return}
  var html='';
  if(curFilter==='nextapo'){
    var today2=new Date(); today2.setHours(0,0,0,0);
    var todayApo=list.filter(function(p){ var d=new Date(p.nextApo); d.setHours(0,0,0,0); return d.getTime()===today2.getTime(); });
    var futureApo=list.filter(function(p){ var d=new Date(p.nextApo); d.setHours(0,0,0,0); return d.getTime()>today2.getTime(); });
    if(todayApo.length){html+='<div class="slabel">📅 今日</div>';todayApo.forEach(function(p){html+=cHTML(p)})}
    if(futureApo.length){html+='<div class="slabel">予定</div>';futureApo.forEach(function(p){html+=cHTML(p)})}
  } else if(curFilter==='reminder'){
    var over=list.filter(function(p){return ddiff(p.reminder)<0});
    var soon=list.filter(function(p){var d=ddiff(p.reminder);return d!==null&&d>=0&&d<=2});
    var up=list.filter(function(p){return ddiff(p.reminder)>2});
    if(over.length){html+='<div class="slabel">⚠️ 期限切れ</div>';over.forEach(function(p){html+=cHTML(p)})}
    if(soon.length){html+='<div class="slabel">🔴 今すぐ</div>';soon.forEach(function(p){html+=cHTML(p)})}
    if(up.length){html+='<div class="slabel">近日中</div>';up.forEach(function(p){html+=cHTML(p)})}
  } else if(curFilter==='birthday'){
    var todayBD=list.filter(function(p){
      var now=new Date();now.setHours(0,0,0,0);
      var parts=p.birthday.split('-');
      var next=new Date(now.getFullYear(),parseInt(parts[1])-1,parseInt(parts[2]));
      return Math.round((next-now)/86400000)===0;
    });
    var yesterdayBD=list.filter(function(p){
      var now=new Date();now.setHours(0,0,0,0);
      var parts=p.birthday.split('-');
      var next=new Date(now.getFullYear(),parseInt(parts[1])-1,parseInt(parts[2]));
      return Math.round((next-now)/86400000)===-1;
    });
    var tomorrowBD=list.filter(function(p){
      var now=new Date();now.setHours(0,0,0,0);
      var parts=p.birthday.split('-');
      var next=new Date(now.getFullYear(),parseInt(parts[1])-1,parseInt(parts[2]));
      return Math.round((next-now)/86400000)===1;
    });
    var restBD=list.filter(function(p){
      var now=new Date();now.setHours(0,0,0,0);
      var parts=p.birthday.split('-');
      var next=new Date(now.getFullYear(),parseInt(parts[1])-1,parseInt(parts[2]));
      var d=Math.round((next-now)/86400000);
      return d>1&&d<=30;
    });
    if(todayBD.length){html+='<div class="slabel">🎂 今日</div>';todayBD.forEach(function(p){html+=cHTML(p)})}
    if(yesterdayBD.length){html+='<div class="slabel">昨日</div>';yesterdayBD.forEach(function(p){html+=cHTML(p)})}
    if(tomorrowBD.length){html+='<div class="slabel">明日</div>';tomorrowBD.forEach(function(p){html+=cHTML(p)})}
    if(restBD.length){html+='<div class="slabel">近い人</div>';restBD.forEach(function(p){html+=cHTML(p)})}
    if(!list.length){html='<div class="empty">30日以内に誕生日の人はいません</div>'}
  } else if(curFilter==='random'){
    html+='<div class="slabel">🎲 ランダム</div>';
    list.forEach(function(p){html+=cHTML(p)});
  } else if(curFilter==='independent'){
    html+='<div class="slabel">独立</div>';
    list.forEach(function(p){html+=cHTML(p)});
  } else if(curFilter==='naoi'){
    html+='<div class="slabel">直以外</div>';
    list.forEach(function(p){html+=cHTML(p)});
  } else if(curFilter==='noapproach'){
    html+='<div class="slabel">アプローチしない</div>';
    list.forEach(function(p){html+=cHTML(p)});
  } else {
    list.forEach(function(p){html+=cHTML(p)});
  }
  wrap.innerHTML=html;
}

function doAnalyzeMap(dataUrl){
  var btn = document.getElementById('btn-analyze');
  btn.textContent = '解析中…'; btn.disabled = true;
  var base64 = dataUrl.split(',')[1];
  var mediaType = dataUrl.split(';')[0].split(':')[1];
  var names = people.map(function(p){ return p.name; }).join('、');
  var apiKey = getApiKey();
  if(!apiKey){
    mapError('APIキーが設定されていません。メニュー→設定から入力してください。');
    return;
  }
  var promptText = 'これはAmwayビジネスのMAP（手書き計画表）の写真です。'
    + 'このMAPは2つのセクションがあります：'
    + '①よめてるMAP（上半分）：各人物の今月確定しているPV数が丸の横に丸数字で書かれています。'
    + '②イメージMAP（下半分）：同じ人物が再び登場し、目標PV数・アポ日・アクション・メモが周辺に書かれています。'
    + '同じ人物が両セクションに登場する場合は統合してください。'
    + '丸で囲まれた文字が人物名です。丸数字（①②③など）はPV数です。日付はm/d形式です。'
    + 'actionsとmemoは手書きメモを読み取り、自然な日本語に整えて記載してください。略語・記号・箇条書きは読みやすい文章に変換してください。\n'
    + '次のアポイント日付（例:4/26、3/20など）が読み取れた場合はnext_apoに"YYYY-MM-DD"形式で入れてください。\n\n'
    + '既知リスト（一致する場合はそちらの名前を使用）: ' + names + '\n\n'
    + '以下のJSON形式のみで返答してください（他のテキスト一切不要）:\n'
    + '{"results":[{"name":"人物名","pv_current":null,"pv_target":null,"next_apo":"YYYY-MM-DDまたはnull","actions":["整えた日本語のアクション"],"memo":"整えた日本語のメモ","known":true}]}';

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-5',
      max_tokens: 4000,
      messages: [{ role: 'user', content: [
        { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
        { type: 'text', text: promptText }
      ]}]
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    var text = d.content && d.content[0] && d.content[0].text;
    if(!text){ mapError('解析に失敗しました'); return; }
    try {
      var clean = text.replace(/^[\s\S]*?({[\s\S]*})[\s\S]*$/, '$1').trim();
      showMapResult(JSON.parse(clean));
    } catch(e){ mapError('結果の読み取りに失敗しました: ' + e.message); }
  })
  .catch(function(e){ mapError('通信エラー: ' + e.message); });
}

function mapError(msg){
  var btn = document.getElementById('btn-analyze');
  if(btn){ btn.textContent = 'MAP を解析する'; btn.disabled = false; }
  var res = document.getElementById('map-result');
  if(res) res.innerHTML = '<div style="padding:16px;text-align:center;color:var(--accent);font-size:13px">'+msg+'</div>';
}

var mapSelections = {};

function showMapResult(result){
  mapLocked = true;
  mapSelections = {};
  try { localStorage.setItem('map_result_cache', JSON.stringify(result)); } catch(e){}

  var allResults = result.results || [];
  if(!allResults.length){
    allResults = (result.people||[]).map(function(p){ return Object.assign({known:true},p); })
      .concat((result.unrecognized||[]).map(function(p){
        if(typeof p==='string') return {name:p,known:false,pv_current:null,pv_target:null,actions:[],memo:''};
        return Object.assign({known:false},p);
      }));
  }

  var recItems = allResults.filter(function(item){ return item.known; });
  var unrecItems = allResults.filter(function(item){ return !item.known; });

  var mapDateEl = document.getElementById('map-date');
  var dateStr = (function(){
    if(mapDateEl && mapDateEl.value){ var d=new Date(mapDateEl.value); return (d.getMonth()+1)+'/'+d.getDate(); }
    var n=new Date(); return (n.getMonth()+1)+'/'+n.getDate();
  })();

  function makeInfoText(item){
    var parts=[];
    if(item.pv_current) parts.push('現PV: '+item.pv_current);
    if(item.pv_target) parts.push('目標PV: '+item.pv_target);
    if(item.pv) parts.push('PV: '+item.pv);
    if(item.actions && item.actions.length) parts.push(item.actions.join('、'));
    if(item.memo) parts.push(item.memo);
    return parts.join(' / ');
  }
  function getNextApo(item){ return item.next_apo || null; }

  function getVal(key, field, fallback){
    var sel = mapSelections[key] || {};
    return sel[field] !== undefined ? sel[field] : fallback;
  }

  function renderResults(){
    var section = document.getElementById('map-result');
    if(!section) return;
    var html = '';

    if(recItems.length){
      html += '<div style="padding:12px 0 6px"><div style="font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--ink3)">✅ 認識できた人（'+recItems.length+'人）</div></div>';
      recItems.forEach(function(item,idx){
        var key='rec_'+idx;
        var p2=people.find(function(x){return x.name===item.name;});
        var action=getVal(key,'action','');
        var infoText=getVal(key,'infoText',makeInfoText(item));
        var memoText=getVal(key,'memoText',p2?p2.memo||'':'');
        var reminder=getVal(key,'reminder',p2?p2.reminder||'':'').replace(/\//g,'-');
        var recNextApo=getVal(key,'nextApo',p2?p2.nextApo||'':'').replace(/\//g,'-');
        html+='<div style="background:var(--surface);border-radius:12px;padding:12px;margin-bottom:8px;border:1px solid var(--border)">'

    }

    if(unrecItems.length){
      html += '<div style="padding:12px 0 6px"><div style="font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--ink3)">❓ 確認が必要（'+unrecItems.length+'人）</div></div>';
      unrecItems.forEach(function(item,idx){
        var key='unrec_'+idx;
        var sel=mapSelections[key]||{};
        var assignedP=sel.personId?people.find(function(x){return x.id===sel.personId;}):null;
        var action=sel.action||'';
        var infoText=getVal(key,'infoText',makeInfoText(item));
        var candidates=people.filter(function(p){
          return p.name.indexOf(item.name)!==-1||item.name.indexOf(p.name)!==-1;
        }).slice(0,3);

        html+='<div style="background:var(--surface);border-radius:12px;padding:12px;margin-bottom:8px;border:1px solid var(--border)">'
          +'<div style="font-size:14px;font-weight:700;margin-bottom:6px">「'+item.name+'」</div>';

        if(action==='skip'){
          html+='<span style="font-size:12px;color:var(--ink3)">記録しない ✓ </span>'
            +'<button class="mub" data-key="'+key+'" style="font-size:11px;color:var(--accent);background:none;border:none;cursor:pointer;text-decoration:underline">取り消し</button>';
        } else if(action==='naoi'){
          html+='<span style="font-size:12px;color:#C07800;font-weight:600">直以外フラグ予定 ✓ </span>'
            +'<button class="mub" data-key="'+key+'" style="font-size:11px;color:var(--accent);background:none;border:none;cursor:pointer;text-decoration:underline">取り消し</button>';
        } else if(assignedP){
          var memoText=getVal(key,'memoText',assignedP.memo||'');
          var reminder=getVal(key,'reminder',assignedP.reminder||'').replace(/\//g,'-');
          html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
            +'<div style="font-size:12px;color:var(--green);font-weight:600">→ '+assignedP.name+'</div>'
            +'<button class="mdb" data-pid="'+assignedP.id+'" style="padding:3px 10px;font-size:11px;background:var(--surface2);border:1.5px solid var(--border);border-radius:6px;cursor:pointer;color:var(--ink2)">詳細を見る</button>'
            +'</div>'
            +'<div style="font-size:11px;color:var(--ink3);margin-bottom:3px">📌 次アポ日</div>'
            +'<input type="date" class="efield mnae" data-key="'+key+'" data-field="nextApo" value="'+getVal(key,'nextApo',(assignedP?assignedP.nextApo||'':'')).replace(/\//g,'-')+'" style="font-size:12px;padding:6px 8px;margin-bottom:6px;width:100%">'
            +'<div style="font-size:11px;color:var(--ink3);margin-bottom:3px">📅 リマインド日</div>'
            +'<input type="date" class="efield mre" data-key="'+key+'" data-field="reminder" value="'+reminder+'" style="font-size:12px;padding:6px 8px;margin-bottom:6px;width:100%">'
            +'<div style="font-size:11px;color:var(--ink3);margin-bottom:3px">既存メモ</div>'
            +'<textarea class="efield mme" data-key="'+key+'" data-field="memoText" rows="2" style="font-size:12px;resize:none;line-height:1.5;margin-bottom:6px;width:100%">'+memoText+'</textarea>'
            +'<div style="font-size:11px;color:var(--ink3);margin-bottom:3px">読み取り内容</div>'
            +'<textarea class="efield mie" data-key="'+key+'" data-field="infoText" rows="2" style="font-size:12px;resize:none;line-height:1.5;margin-bottom:10px;width:100%">'+infoText+'</textarea>'
            +'<div style="display:flex;gap:6px;flex-wrap:wrap">'
            +'<button class="mab" data-key="'+key+'" data-action="update" style="padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:'+(action==='update'?'var(--accent)':'var(--surface2)')+';color:'+(action==='update'?'white':'var(--ink2)')+'">更新</button>'
            +'<button class="mab" data-key="'+key+'" data-action="append" style="padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:'+(action==='append'?'var(--green)':'var(--surface2)')+';color:'+(action==='append'?'white':'var(--ink2)')+'">追記</button>'
            +'<button class="mab" data-key="'+key+'" data-action="none" style="padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;border:1.5px solid var(--border);background:'+(action==='none'?'var(--ink2)':'var(--surface2)')+';color:'+(action==='none'?'white':'var(--ink3)')+'">なし</button>'
            +'</div>';
        } else {
          html+='<div style="font-size:11px;color:var(--ink2);margin-bottom:6px">'+infoText+'</div>'
            +'<div style="font-size:11px;color:var(--ink3);margin-bottom:6px">誰ですか？</div>'
            +'<div style="display:flex;flex-wrap:wrap;gap:6px">'
            +candidates.map(function(p){
              return '<button class="mcb" data-key="'+key+'" data-pid="'+p.id+'" style="padding:5px 10px;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer">'+p.name+'</button>';
            }).join('')
            +'<button class="msb" data-key="'+key+'" style="padding:5px 10px;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;font-size:12px;cursor:pointer">🔍 検索</button>'
            +'<button class="mnb" data-key="'+key+'" style="padding:5px 10px;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;font-size:12px;cursor:pointer">＋ 新規</button>'
            +'<button class="mnaib" data-key="'+key+'" style="padding:5px 10px;background:#FEF3E2;border:1.5px solid #E8A030;border-radius:8px;font-size:12px;font-weight:600;color:#C07800;cursor:pointer">直以外</button>'
            +'<button class="mskb" data-key="'+key+'" style="padding:5px 10px;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;font-size:12px;color:var(--ink3);cursor:pointer">記録しない</button>'
            +'</div>';
        }
        html+='</div>';
      });
    }

    if(!recItems.length && !unrecItems.length){
      html='<div style="padding:20px;text-align:center;color:var(--ink3);font-size:13px">人物が検出されませんでした</div>';
    }

    html+='<div style="padding:8px 0 20px"><button id="btn-map-save" style="width:100%;padding:14px;background:var(--accent);color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer">保存する</button></div>';

    section.innerHTML = html;

    // テキストエリア・日付の変更を即時保存
    section.querySelectorAll('.mme,.mie').forEach(function(ta){
      ta.oninput = function(){
        if(!mapSelections[ta.dataset.key]) mapSelections[ta.dataset.key]={};
        mapSelections[ta.dataset.key][ta.dataset.field] = ta.value;
        try{ localStorage.setItem('map_selections_cache', JSON.stringify(mapSelections)); }catch(e){}
      };
    });
    section.querySelectorAll('.mre,.mnae').forEach(function(inp){
      inp.onchange = function(){
        if(!mapSelections[inp.dataset.key]) mapSelections[inp.dataset.key]={};
        mapSelections[inp.dataset.key][inp.dataset.field] = inp.value;
      };
    });

    // アクションボタン（更新/追記/なし）
    section.querySelectorAll('.mab').forEach(function(btn){
      btn.onclick = function(){
        var key=btn.dataset.key;
        if(!mapSelections[key]) mapSelections[key]={};
        // 現在のテキストエリアの値を保存
        var mme=section.querySelector('.mme[data-key="'+key+'"]');
        var mie=section.querySelector('.mie[data-key="'+key+'"]');
        var mre=section.querySelector('.mre[data-key="'+key+'"]');
        if(mme) mapSelections[key].memoText=mme.value;
        if(mie) mapSelections[key].infoText=mie.value;
        if(mre) mapSelections[key].reminder=mre.value;
        mapSelections[key].action=btn.dataset.action;
        renderResults();
      };
    });

    // 候補者選択
    section.querySelectorAll('.mcb').forEach(function(btn){
      btn.onclick = function(){
        var key=btn.dataset.key;
        var p2=people.find(function(x){return x.id===parseInt(btn.dataset.pid);});
        if(!p2) return;
        var mie=section.querySelector('.mie[data-key="'+key+'"]');
        var infoText=mie?mie.value:makeInfoText(unrecItems[parseInt(key.replace('unrec_',''))]);
        mapSelections[key]={personId:p2.id,infoText:infoText,memoText:p2.memo||'',reminder:p2.reminder||'',nextApo:p2.nextApo||'',action:''};
        renderResults();
      };
    });

    // 検索
    section.querySelectorAll('.msb').forEach(function(btn){
      btn.onclick = function(){
        var key=btn.dataset.key;
        var idx=parseInt(key.replace('unrec_',''));
        var mie=section.querySelector('.mie[data-key="'+key+'"]');
        var infoText=mie?mie.value:makeInfoText(unrecItems[idx]);
        openMapSearchOverlay(unrecItems[idx], idx, function(p2){
          mapSelections[key]={personId:p2.id,infoText:infoText,memoText:p2.memo||'',reminder:p2.reminder||'',nextApo:p2.nextApo||'',action:''};
          renderResults();
        });
      };
    });

    // 新規
    section.querySelectorAll('.mnb').forEach(function(btn){
      btn.onclick = function(){
        var key=btn.dataset.key;
        var idx=parseInt(key.replace('unrec_',''));
        var mie=section.querySelector('.mie[data-key="'+key+'"]');
        var infoText=mie?mie.value:makeInfoText(unrecItems[idx]);
        openMapNewOverlay(unrecItems[idx], idx, function(name){
          var newP=people[0];
          mapSelections[key]={personId:newP.id,infoText:infoText,memoText:newP.memo||'',reminder:newP.reminder||'',nextApo:newP.nextApo||'',action:''};
          renderResults();
        });
      };
    });

    // 直以外
    section.querySelectorAll('.mnaib').forEach(function(btn){
      btn.onclick = function(){
        var key=btn.dataset.key;
        mapSelections[key]={action:'naoi',name:unrecItems[parseInt(key.replace('unrec_',''))].name};
        renderResults();
      };
    });

    // 記録しない
    section.querySelectorAll('.mskb').forEach(function(btn){
      btn.onclick = function(){
        var key=btn.dataset.key;
        mapSelections[key]={action:'skip'};
        renderResults();
      };
    });

    // 取り消し
    section.querySelectorAll('.mub').forEach(function(btn){
      btn.onclick = function(){
        delete mapSelections[btn.dataset.key];
        renderResults();
      };
    });

    // 詳細を見る（MAP画面の上にオーバーレイで詳細画面を表示）
    section.querySelectorAll('.mdb').forEach(function(btn){
      btn.onclick = function(){
        var pid = parseInt(btn.dataset.pid);
        var p2 = people.find(function(x){ return x.id===pid; });
        if(!p2) return;
        // 詳細画面をオーバーレイ表示
        var ov = document.createElement('div');
        ov.id = 'map-detail-overlay';
        ov.style.cssText = 'position:fixed;inset:0;z-index:700;background:var(--bg);overflow-y:auto';
        ov.innerHTML =
          '<div style="background:var(--surface);padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100">'
          +'<button id="mdo-back" style="width:32px;height:32px;border-radius:50%;background:var(--surface2);border:1.5px solid var(--border);font-size:18px;cursor:pointer">←</button>'
          +'<div style="font-size:17px;font-weight:700">'+p2.name+'の詳細</div>'
          +'</div>'
          +'<div id="mdo-body"></div>';
        document.body.appendChild(ov);

        // 詳細HTMLを描画（dHTMLを流用）
        curP = p2;
        document.getElementById('mdo-body').innerHTML = dHTML(p2);

        // 閉じるボタン
        document.getElementById('mdo-back').onclick = function(){
          // 変更をrenderResultsに反映（メモが変わった場合）
          var existing = document.getElementById('map-detail-overlay');
          if(existing) existing.remove();
          curP = null;
          renderResults();
        };

        // 詳細画面のbindDetailを適用（btn-closeをmdo-backに向ける）
        bindDetail();
        document.getElementById('btn-close').onclick = function(){
          var existing = document.getElementById('map-detail-overlay');
          if(existing) existing.remove();
          curP = null;
          renderResults();
        };
      };
    });

    // 保存ボタン
    var saveBtn=document.getElementById('btn-map-save');
    if(saveBtn) saveBtn.onclick = function(){
      var saved=0;
      recItems.forEach(function(item,idx){
        var key='rec_'+idx;
        var sel=mapSelections[key]||{};
        if(!sel.action||sel.action==='none') return;
        var p2=people.find(function(x){return x.name===item.name;});
        if(!p2) return;
        var mie=section.querySelector('.mie[data-key="'+key+'"]');
        var mre=section.querySelector('.mre[data-key="'+key+'"]');
        var infoVal=mie?mie.value.trim():(sel.infoText||'');
        if(sel.action==='update') p2.memo=infoVal;
        else if(sel.action==='append') p2.memo=p2.memo?p2.memo+'\n'+infoVal:infoVal;
        if(mre&&mre.value) p2.reminder=mre.value;
        var mnae2=section.querySelector('.mnae[data-key="'+key+'"]');
        if(mnae2) p2.nextApo=mnae2.value||null;
        saveToSheet(p2); saved++;
      });
      unrecItems.forEach(function(item,idx){
        var key='unrec_'+idx;
        var sel=mapSelections[key]||{};
        if(sel.action==='naoi'){
          var p2=people.find(function(x){return x.name===item.name;});
          if(p2&&!p2.flags.includes('直以外')){p2.flags.push('直以外');saveToSheet(p2);saved++;}
          return;
        }
        if(sel.action==='skip'||!sel.personId) return;
        var p2=people.find(function(x){return x.id===sel.personId;});
        if(!p2) return;
        var mie=section.querySelector('.mie[data-key="'+key+'"]');
        var mre=section.querySelector('.mre[data-key="'+key+'"]');
        var infoVal=mie?mie.value.trim():(sel.infoText||'');
        if(sel.action==='update') p2.memo=infoVal;
        else if(sel.action==='append') p2.memo=p2.memo?p2.memo+'\n'+infoVal:infoVal;
        if(mre&&mre.value) p2.reminder=mre.value;
        var mnae3=section.querySelector('.mnae[data-key="'+key+'"]');
        if(mnae3) p2.nextApo=mnae3.value||null;
        saveToSheet(p2); saved++;
      });
      try{localStorage.removeItem('map_result_cache');localStorage.removeItem('map_selections_cache');localStorage.removeItem('map_date_cache');}catch(e){}
      render();
      toast(saved+'件を保存しました ✓');
      closeMapUpload();
    };
  }

  renderResults();
}





function openMapSearchOverlay(item, unidx, callback){
  // オーバーレイで検索画面を表示
  var overlay = document.createElement('div');
  overlay.id = 'map-search-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:500;background:var(--surface);overflow-y:auto';
  overlay.innerHTML =
    '<div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;position:sticky;top:0;background:var(--surface);z-index:100">'
    +'<button id="mso-back" style="width:32px;height:32px;border-radius:50%;background:var(--surface2);border:1.5px solid var(--border);font-size:18px;cursor:pointer">←</button>'
    +'<div style="font-size:16px;font-weight:700;flex:1">「'+item.name+'」は誰？</div>'
    +'<button id="mso-close" style="width:32px;height:32px;border-radius:50%;background:var(--surface2);border:1.5px solid var(--border);font-size:16px;cursor:pointer">✕</button>'
    +'</div>'
    +'<div style="padding:20px">'
    +'<input class="efield" id="mso-inp" placeholder="名前で検索…" style="font-size:15px">'
    +'</div>'
    +'<div id="mso-list" style="padding:0 20px"></div>';

  document.body.appendChild(overlay);

  function closeOverlay(){ var o=document.getElementById('map-search-overlay'); if(o)o.remove(); }
  document.getElementById('mso-back').onclick = closeOverlay;
  document.getElementById('mso-close').onclick = closeOverlay;

  var inp = document.getElementById('mso-inp');
  setTimeout(function(){ if(inp) inp.focus(); }, 100);
  inp.addEventListener('input', function(){
    var q = inp.value.trim();
    var listEl = document.getElementById('mso-list');
    if(!q){ listEl.innerHTML=''; return; }
    var hits = people.filter(function(p){ return p.name.indexOf(q)!==-1; });
    listEl.innerHTML = hits.map(function(p){
      return '<div class="mso-item" data-pid="'+p.id+'" style="padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center">'
        +'<span style="font-size:15px;font-weight:600">'+p.name+'</span>'
        +'<span style="font-size:12px;color:var(--ink3)">選択 →</span>'
        +'</div>';
    }).join('') || '<div style="color:var(--ink3);font-size:13px;padding:20px;text-align:center">該当なし</div>';
    listEl.querySelectorAll('.mso-item').forEach(function(el){
      el.onclick = function(){
        var p = people.find(function(x){ return x.id===parseInt(el.dataset.pid); });
        if(!p) return;
        if(callback) callback(p);
        closeOverlay();
      };
    });
  });
}

  var existing = document.getElementById('map-new-overlay');
  if(existing) existing.remove();

  var mapDateEl = document.getElementById('map-date');
  var dateStr = mapDateEl && mapDateEl.value
    ? (function(){ var d=new Date(mapDateEl.value); return (d.getMonth()+1)+'/'+d.getDate(); })()
    : (function(){ var n=new Date(); return (n.getMonth()+1)+'/'+n.getDate(); })();

  var ov = document.createElement('div');
  ov.id = 'map-new-overlay';
  ov.style.cssText = 'position:fixed;inset:0;z-index:600;background:var(--bg);overflow-y:auto';

    +'<textarea class="efield" id="mnov-memo" rows="2" placeholder="メモ" style="font-size:12px;resize:none;line-height:1.5;color:var(--ink2)"></textarea>'
    +'<div class="ssec"><div class="erow"><div class="elabel">登録状況</div>'
    +'<div class="spicker">'
    +'<button class="sbtn snone active" data-s="none" id="mnov-s-none">未登録</button>'
    +'<button class="sbtn" data-s="pc" id="mnov-s-pc">PC</button>'
    +'<button class="sbtn" data-s="abo" id="mnov-s-abo">ABO</button>'
    +'</div></div>'
    +'<div class="erow"><div class="elabel">📌 次アポ日</div><input class="efield" type="date" id="mnov-nextapo"></div>'
    +'<div class="erow"><div class="elabel">📅 リマインド日</div><input class="efield" type="date" id="mnov-reminder"></div>'
    +'<div class="erow"><div class="elabel">🎂 誕生日</div><input class="efield" type="date" id="mnov-birthday"></div>'
    +'<div class="erow"><div class="elabel">フラグ</div>'
    +'<div class="fwrap" id="mnov-fwrap">'+allFlags.map(function(f){return '<button class="fbtn" data-flag="'+f+'">'+f+'</button>';}).join('')+'<button class="fadd" id="mnov-fadd">＋</button></div></div>'
    +'</div>'
    +'<div class="ssec"><div class="ssec-title">レクチャー・デモ履歴</div><div class="lgrid">'+lecsHTML+'</div></div>'
    +'<div style="padding:0 0 20px">'
    +'<button id="mnov-save" style="width:100%;padding:14px;background:var(--accent);color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer">追加する</button>'
    +'</div></div>';

  document.body.appendChild(ov);

  var curStatus = 'none';
  var mnovSelFlags = [];
  ov.querySelectorAll('[data-s]').forEach(function(btn){
    btn.onclick = function(){
      curStatus = btn.dataset.s;
      ov.querySelectorAll('[data-s]').forEach(function(b){ b.className = b.className.replace(' s'+b.dataset.s,''); });
      btn.className += ' s'+curStatus;
    };
  });
  function bindMnovFlags(){
    ov.querySelectorAll('#mnov-fwrap .fbtn').forEach(function(btn){
      btn.onclick = function(){
        var f = btn.dataset.flag;
        var i = mnovSelFlags.indexOf(f);
        if(i===-1){mnovSelFlags.push(f);btn.classList.add('on');btn.textContent='✓ '+f;}
        else{mnovSelFlags.splice(i,1);btn.classList.remove('on');btn.textContent=f;}
      };
    });
  }
  bindMnovFlags();
  document.getElementById('mnov-fadd').onclick = function(){
    var name = prompt('新しいフラグ名を入力');
    if(!name||!name.trim()) return;
    name = name.trim();
    if(allFlags.includes(name)){toast('すでに存在するフラグです');return;}
    allFlags.push(name);
    var wrap = document.getElementById('mnov-fwrap');
    var addBtn = document.getElementById('mnov-fadd');
    var newBtn = document.createElement('button');
    newBtn.className = 'fbtn on';
    newBtn.dataset.flag = name;
    newBtn.textContent = '✓ '+name;
    wrap.insertBefore(newBtn, addBtn);
    mnovSelFlags.push(name);
    bindMnovFlags();
  };

  document.getElementById('mnov-close').onclick = function(){ ov.remove(); };

  document.getElementById('mnov-save').onclick = function(){
    var name = document.getElementById('mnov-name').value.trim();
    if(!name){ toast('名前を入力してください'); return; }
    var lecs = {};
    LECS.forEach(function(l){ lecs[l]=null; });
    ov.querySelectorAll('.mnov-lec').forEach(function(el){
      lecs[el.dataset.lec] = el.value ? el.value.replace(/-/g,'/') : null;
    });
    var memo = document.getElementById('mnov-memo').value.trim();
    var na3 = document.getElementById('mnov-nextapo') ? document.getElementById('mnov-nextapo').value || null : null;
    var rem = document.getElementById('mnov-reminder').value || null;
    var bd = document.getElementById('mnov-birthday').value || null;

    // テキストエリアの編集内容を取得
    var infoTa = document.querySelector('.map-info-edit[data-type="unrec"][data-idx="'+unidx+'"]');
    var infoText = infoTa ? infoTa.value.trim() : '';

    var newPerson = {
      id:nextId(), name:name, memo:memo,
      status:curStatus, flags:mnovSelFlags.slice(),
      nextApo:na3, reminder:rem, lastContact:todayStr(),
      makerDate:null, birthday:bd,
      lectures:lecs, logs:[]
    };
    people.unshift(newPerson);
    saveToSheet(newPerson);
    ov.remove();
    if(callback) callback(name);
    render();
    toast(name+' を追加しました ✓');
  };
}


function closeSheet(){
  if(mapLocked) return;
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}
function forceCloseSheet(){
  mapLocked = false;
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}
function toast(msg){
  var old=document.getElementById('_toast');if(old)old.remove();
  var t=document.createElement('div');t.id='_toast';t.textContent=msg;
  t.style.cssText='position:fixed;top:16px;right:16px;background:#1A1714;color:white;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;z-index:600;transition:opacity .4s';
  document.body.appendChild(t);
  setTimeout(function(){t.style.opacity='0';setTimeout(function(){t.remove()},400)},1400);
}

document.getElementById('btn-add').onclick=openAdd;
var btnFlagMgr=document.getElementById('btn-flag-mgr');
if(btnFlagMgr)btnFlagMgr.onclick=function(){openFlagMgr(function(){render();})};
document.getElementById('overlay').onclick=function(){
  if(mapLocked) return; // MAP解析結果表示中は閉じない
  closeSheet();
};
// チップはrenderChips()で動的生成
document.getElementById('btn-search').onclick=openSearch;
document.getElementById('btn-menu').onclick=openMenu;
document.querySelectorAll('.tab').forEach(function(el){
  el.onclick=function(){
    curCat=el.dataset.c;
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
    el.classList.add('active');render();
  };
});


// リロード時の画面復元
if(window.location.hash === '#map'){
  loadFromSheet();
  setTimeout(function(){
    openMapUpload();
    // 解析結果キャッシュがあれば復元
    setTimeout(function(){
      try {
        var cached = localStorage.getItem('map_result_cache');
        var selCached = localStorage.getItem('map_selections_cache');
        if(cached){
          mapLocked = true;
          if(selCached) mapSelections = JSON.parse(selCached);
          showMapResult(JSON.parse(cached));
        }
      } catch(e){}
    }, 300);
  }, 500);
} else {
  loadFromSheet();
}
</script>
